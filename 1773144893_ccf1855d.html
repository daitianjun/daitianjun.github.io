            </div>

        // --- 2. 数据解析与处理 ---
        
        // 将原始 Markdown 表格转换为 JSON 对象数组
        function parseData(rawString) {
            const lines = rawString.trim().split('\n');
            const headers = lines[0].split('|').map(h => h.trim()).filter(h => h);
            const data = [];
            
            for (let i = 2; i < lines.length; i++) {
                const line = lines[i];
                if (!line.trim() || line.startsWith('|--')) continue;
                
                // 简单的按 | 分割，注意处理被引号包裹的内容比较复杂，这里假设数据中不包含 | 字符
                // 但第一列是 Python list，包含逗号。
                const rawCols = line.split('|').map(c => c.trim());
                
                // 去掉首尾空元素
                if (rawCols[0] === '') rawCols.shift();
                if (rawCols[rawCols.length - 1] === '') rawCols.pop();

                const row = {};
                headers.forEach((header, index) => {
                    let val = rawCols[index];
                    if (val === 'nan') val = '';
                    
                    // 特殊处理第一列：将字符串形式的数组转为真实数组
                    if (header === '观众评论') {
                        try {
                            // 简单正则提取内容，去除 []
                            const cleanStr = val.replace(/'/g, '"');
                            if (cleanStr.startsWith('[')) {
                                row.comments = JSON.parse(cleanStr);
                            } else {
                                row.comments = [val];
                            }
                        } catch (e) {
                            row.comments = [val];
                        }
                    } else {
                        row[header] = val;
                    }
                });
                data.push(row);
            }
            return data;
        }

        const parsedData = parseData(RAW_DATA);

        // 计算全局 KPI
        const totalComments = parsedData.reduce((sum, row) => sum + (row.comments ? row.comments.length : 0), 0);
        const totalUsers = parsedData.length; // 假设每行一个用户
        const avgComments = totalUsers > 0 ? (totalComments / totalUsers).toFixed(1) : 0;

        // 辅助函数：统计频率
        function countFrequency(data, key) {
            const counts = {};
            data.forEach(item => {
                const val = item[key] || '未知';
                // 处理多值情况 (例如 "降噪/环境声类、音质/音效类")
                const values = val.includes('、') ? val.split('、') : [val];
                values.forEach(v => {
                    counts[v] = (counts[v] || 0) + 1;
                });
            });
            return Object.entries(counts).sort((a, b) => b[1] - a[1]);
        }

        // 更新 DOM KPI
        document.getElementById('kpi-comments').innerText = totalComments;
        document.getElementById('kpi-users').innerText = totalUsers;
        document.getElementById('kpi-avg-comments').innerText = avgComments;

        // 获取最热门场景
        const scenarioCounts = countFrequency(parsedData, '场景一级分类');
        document.getElementById('kpi-top-scenario').innerText = scenarioCounts[0] ? scenarioCounts[0][0] : '-';

        // --- 3. 图表初始化 ---

        Chart.defaults.font.family = "'Noto Sans SC', sans-serif";
        Chart.defaults.color = '#6b7280';

        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: { usePointStyle: true, padding: 20 }
                }

        };

        // 3.1 场景一级分类 (环形图)
        const ctxL1 = document.getElementById('chartScenarioL1').getContext('2d');
        const chartL1 = new Chart(ctxL1, {
            type: 'doughnut',
            data: {
                labels: scenarioCounts.map(d => d[0]),

                }]

            options: {

        });

        // 3.2 设备类型 (条形图)
        const deviceCounts = countFrequency(parsedData, '设备类型');
        const ctxDevice = document.getElementById('chartDeviceType').getContext('2d');
        const chartDevice = new Chart(ctxDevice, {

            const option = document.createElement('option');
            option.value = scenario;
            option.innerText = scenario;
            scenarioSelect.appendChild(option);
        });

        // 渲染深度分析
        function renderDeepAnalysis(scenario) {
            const filteredData = parsedData.filter(d => d['场景一级分类'] === scenario);
            
            // 4.1 设备类型 (饼图)
            const devData = countFrequency(filteredData, '设备类型');
            renderChart('deepChartDevice', 'pie', devData, '设备类型分布', deepCharts, 'device');

            // 4.2 & 4.3 二三级分类 (为了简化，合并展示二级分类，或动态切换，这里展示二级分类为主)
            const subData = countFrequency(filteredData, '场景二级分类');
            renderChart('deepChartSubScenario', 'doughnut', subData, '细分场景分布', deepCharts, 'sub');

            // 4.4 展示效果 (条形图)
            const effectData = countFrequency(filteredData, '想让主播展示什么效果');
            renderChart('deepChartEffect', 'bar', effectData, '期望展示效果', deepCharts, 'effect');

            // 4.5 满意度 (条形图)
            const satData = countFrequency(filteredData, '主播所展示效果是否满意');
            renderChart('deepChartSatisfaction', 'bar', satData, '用户满意度', deepCharts, 'sat');

            // 更新文本洞察
            updateInsights(scenario, filteredData, devData, effectData, satData);
        }

        function renderChart(canvasId, type, data, label, storageObj, key) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            if (storageObj[key]) storageObj[key].destroy();

            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#6366f1', '#64748b'];
            
            storageObj[key] = new Chart(ctx, {
                type: type,
                data: {
                    labels: data.map(d => d[0]),
                    datasets: [{
                        label: label,
                        data: data.map(d => d[1]),
                        backgroundColor: type === 'pie' || type === 'doughnut' ? colors : '#0ea5e9',
                        borderWidth: 1
                    }]
                },
                options: {
                    ...commonOptions,
                    plugins: {
                        legend: { display: type === 'pie' || type === 'doughnut', position: 'right' },
                        title: { display: false }
                    },
                    scales: (type === 'bar') ? {
                        y: { beginAtZero: true, grid: { borderDash: [2, 2] } },
                        x: { grid: { display: false } }
                    } : {}
                }
            });
        }

        function updateInsights(scenario, data, devData, effectData, satData) {
            // 痛点分析
            const painPoints = data.map(d => d['关注点/纠结犹豫点']).filter(d => d).join('；');
            
            // 简单的关键词提取逻辑 (模拟)
            const topPain = "预算、兼容性、参数理解"; // 实际应用中可用更复杂的 NLP
            const topEffect = effectData.length > 0 ? effectData[0][0] : "音质";
            const topDevice = devData.length > 0 ? devData[0][0] : "手机";

            const painEl = document.getElementById('insight-pain');
            painEl.innerText = painPoints ? `用户主要关注：${painPoints.substring(0, 50)}...` : "暂无明显痛点记录";

            const adviceEl = document.getElementById('insight-advice');
            adviceEl.innerHTML = `
                <strong>针对【${scenario}】场景的建议：</strong><br>
                1. <strong>设备推荐：</strong> 重点关注 ${topDevice} 用户，强调兼容性。<br>
                2. <strong>演示重点：</strong> 用户最想看【${topEffect}】的效果，主播应重点演示。<br>
                3. <strong>话术优化：</strong> 针对“预算”和“参数”类犹豫，准备通俗易懂的对比话术。
            `;

            document.getElementById('insight-device').innerText = `首选设备：${topDevice} (${devData[0][1]}次)`;
            document.getElementById('insight-subscenario').innerText = `热门细分：${effectData[0][0]} 等效果需求较高`;
        }

        // 监听下拉变化
        scenarioSelect.addEventListener('change', (e) => {
            renderDeepAnalysis(e.target.value);
        });

        // 初始化默认渲染第一个场景
        if (uniqueScenarios.length > 0) {
            renderDeepAnalysis(uniqueScenarios[0]);
        }

        // --- 5. 表格逻辑 ---
        
        let currentPage = 1;
        const rowsPerPage = 10;
        let currentTableData = [...parsedData]; // 用于排序和搜索

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const start = (currentPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const pageData = currentTableData.slice(start, end);

            pageData.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                
                // 处理评论展示，只显示前2条
                const commentPreview = row.comments.slice(0, 2).map(c => `<div class="text-xs text-gray-500 mb-1">"${c}"</div>`).join('');
                const moreComments = row.comments.length > 2 ? `<div class="text-xs text-blue-400">+${row.comments.length - 2} 更多</div>` : '';

                tr.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900">${commentPreview}${moreComments}</div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row['设备类型'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">
                            ${row['场景一级分类'] || '-'}
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row['场景二级分类'] || '-'}</td>
                    <td class="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" title="${row['关注点/纠结犹豫点']}">${row['关注点/纠结犹豫点'] || '-'}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${row['主播所展示效果是否满意'] || '-'}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('tableInfo').innerText = `显示 ${start + 1}-${Math.min(end, currentTableData.length)} 条，共 ${currentTableData.length} 条`;
        }

        function sortTable(colIndex) {
            const keys = ['comments', '设备类型', '场景一级分类', '场景二级分类', '关注点/纠结犹豫点', '主播所展示效果是否满意'];
            const key = keys[colIndex];
            
            currentTableData.sort((a, b) => {
                const valA = Array.isArray(a[key]) ? a[key].length : a[key];
                const valB = Array.isArray(b[key]) ? b[key].length : b[key];
                return valA > valB ? 1 : -1;
            });
            renderTable();
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
            }
        }

        function nextPage() {
            if (currentPage * rowsPerPage < currentTableData.length) {
                currentPage++;
                renderTable();
            }
        }

        // 搜索功能
        document.getElementById('tableSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            currentTableData = parsedData.filter(row => {
                const commentStr = row.comments ? row.comments.join(' ') : '';
                const scenario = row['场景一级分类'] || '';
                return commentStr.toLowerCase().includes(term) || scenario.toLowerCase().includes(term);
            });
            currentPage = 1;
            renderTable();
        });

        // 初始渲染表格
        renderTable();

    </script>
</body>
</html>
